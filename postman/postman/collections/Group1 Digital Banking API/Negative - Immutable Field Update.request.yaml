$kind: http-request
url: "{{baseUrl}}/api/customers/{{customerId}}"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{accessToken}}
body:
  type: text
  content: |-
    {
      "name": "Jane New",
      "email": "blocked@example.com"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 400', function () { pm.response.to.have.status(400);
      });

      const json = pm.response.json();

      pm.test('Field not updatable', function () {
      pm.expect(json.code).to.eql('FIELD_NOT_UPDATABLE'); });
    language: text/javascript
order: 9000
