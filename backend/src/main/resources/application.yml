spring:
  application:
    name: banking

  profiles:
    active: ${SPRING_PROFILE:h2}

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bankingdb}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  task:
    scheduling:
      pool:
        size: 5

banking:
  categories:
    Housing: ["rent", "mortgage", "lease", "landlord", "condo", "property", "housing"]
    Transport: ["uber", "lyft", "taxi", "transit", "fuel", "gas", "parking", "via rail", "greyhound", "air canada", "westjet"]
    "Food & Drink": ["restaurant", "cafe", "coffee", "starbucks", "tim hortons", "mcdonalds", "grocery", "loblaws", "sobeys", "metro", "pizza", "sushi", "bar", "pub"]
    Entertainment: ["netflix", "spotify", "disney", "cinema", "movie", "theatre", "concert", "ticket", "steam", "playstation", "xbox"]
    Shopping: ["amazon", "ebay", "walmart", "zara", "h&m", "clothing", "shoes", "mall", "online shop"]
    Utilities: ["hydro", "electricity", "internet", "rogers", "bell", "telus", "shaw", "heating", "utility"]
    Health: ["pharmacy", "medical", "doctor", "dentist", "hospital", "clinic", "gym", "fitness", "yoga", "prescription"]
    Income: ["salary", "payroll", "direct deposit", "refund", "cashback", "interest", "dividend"]

  notifications:
    allowed-service-ids:
      payments-service: "${PAYMENTS_SERVICE_KEY_HASH:20eb0536650933acad4ae017f3df774426ea2e4187d13728c99a6baf5e37b2b3}"
      fraud-service: "${FRAUD_SERVICE_KEY_HASH:20eb0536650933acad4ae017f3df774426ea2e4187d13728c99a6baf5e37b2b3}"

  idempotency:
    purge-after-hours: 72

  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}

---

spring:
  config:
    activate:
      on-profile: h2

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:h2:C:/Users/Dusty/Desktop/DigitalBankDB;AUTO_SERVER=TRUE
    username: root
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

