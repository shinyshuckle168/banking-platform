server {
    listen 8080;

    # Frontend code calls both /api/... and direct service paths like /customers/... and /accounts/...
    # Keep both working to avoid environment-specific route breakage.

    location ~ ^/(accounts|customers|standing-orders)(/|$) {
        proxy_pass https://digital-banking-service-524103119199.northamerica-northeast1.run.app;
        proxy_set_header Host digital-banking-service-524103119199.northamerica-northeast1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass https://digital-banking-service-524103119199.northamerica-northeast1.run.app;
        proxy_set_header Host digital-banking-service-524103119199.northamerica-northeast1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}