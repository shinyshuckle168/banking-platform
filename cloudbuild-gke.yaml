steps:
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci
        npm test

  - name: 'sonarsource/sonar-scanner-cli'
    secretEnv: ['SONAR_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sonar-scanner \
          -Dsonar.projectKey=shinyshuckle168_banking-platform \
          -Dsonar.organization=fdm-gcp-2026 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.sources=src \
          -Dsonar.exclusions=node_modules,dist,coverage \
          -Dsonar.userHome=/tmp/sonar \
          -Dsonar.working.directory=/tmp/.scannerwork \
          -Dsonar.login=$$SONAR_TOKEN

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--network=host', '-t', '${_IMAGE}:$SHORT_SHA', '.']

  - name: 'aquasec/trivy:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        trivy image \
          --severity CRITICAL \
          --ignore-unfixed \
          --exit-code 1 \
          ${_IMAGE}:$SHORT_SHA

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=k8s/ # The directory where your Kubernetes manifests are
      - --image=${_IMAGE}:$SHORT_SHA
      - --location=${_GKE_REGION}
      - --cluster=${_CLUSTER}
      - --namespace=banking-dev

images:
  - 'northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend'

availableSecrets:
  secretManager:
    - versionName: projects/gcp-class-14/secrets/sonar-cloud-auth-token/versions/latest
      env: 'SONAR_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE: northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend
  _GKE_REGION: us-central1
  _CLUSTER: my-gke-cluster