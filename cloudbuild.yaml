steps:
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci
        npm test

  - name: 'sonarsource/sonar-scanner-cli'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sonar-scanner \
          -Dsonar.projectKey=shinyshuckle168_banking-platform \
          -Dsonar.organization=fdm-gcp-2026 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.sources=src \
          -Dsonar.exclusions=node_modules,dist,coverage \
          -Dsonar.login=$$SONAR_TOKEN

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--network=host', '-t', 'northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend', '.']

  - name: 'aquasec/trivy:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        trivy image \
          --severity CRITICAL \
          --ignore-unfixed \
          --exit-code 1 \
          ${_IMAGE}

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'frontend'
      - '--image'
      - 'northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend'
      - '--region'
      - 'northamerica-northeast2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend'

availableSecrets:
  secretManager:
    - versionName: projects/gcp-class-14/secrets/sonar-cloud-auth-token/versions/latest
      env: 'SONAR_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE: northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend