steps:
  # ---------- Install + Test ----------
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci
        npm test

  # ---------- SonarQube ----------
  - name: 'sonarsource/sonar-scanner-cli'
    secretEnv: ['SONAR_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sonar-scanner \
          -Dsonar.projectKey=shinyshuckle168_banking-platform \
          -Dsonar.organization=fdm-gcp-2026 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.sources=src \
          -Dsonar.exclusions=node_modules,dist,coverage \
          -Dsonar.userHome=/tmp/sonar \
          -Dsonar.working.directory=/tmp/.scannerwork \
          -Dsonar.login=$$SONAR_TOKEN

  # ---------- Build Docker image ----------
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}:$SHORT_SHA'
      - '.'

  # ---------- Security scan ----------
  - name: 'aquasec/trivy:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        trivy image \
          --severity CRITICAL \
          --ignore-unfixed \
          --exit-code 1 \
          ${_IMAGE}:$SHORT_SHA

  # ---------- Push image ----------
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}:$SHORT_SHA'

  # ---------- Deploy to Cloud Run ----------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - frontend
      - --image=${_IMAGE}:$SHORT_SHA
      - --region=northamerica-northeast2
      - --platform=managed
      - --allow-unauthenticated

images:
  - '${_IMAGE}:$SHORT_SHA'

availableSecrets:
  secretManager:
    - versionName: projects/gcp-class-14/secrets/sonar-cloud-auth-token/versions/latest
      env: 'SONAR_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE: northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend