steps:
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci
        npm test

  - name: 'node:20'
    secretEnv: ['SNYK_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci
        echo "Authenticating..."
        npx snyk auth $$SNYK_TOKEN

        echo "Running open source dependency scan..."
        npx snyk test --all-projects  || true
        
        
  # echo "Running code test..."
  # npx snyk code test --all-projects || true
  

  # - name: 'gcr.io/cloud-builders/docker'
  #   args: ['build', '--network=host', '-t', 'northamerica-northeast2-docker.pkg.dev/gcp-class-14/quickstart-docker-repo/frontend', '.']
 


availableSecrets:
  secretManager:
    - versionName: projects/gcp-class-14/secrets/SNYK_TOKEN/versions/latest
      env: 'SNYK_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY

